[[permission]]
identifier = "allow-print-message"
description = "允许前端调用自定义的日志打印命令"

# 关键改动：commands 后面要接 .allow
commands.allow = [
    "print_message"
]

[[permission]]
identifier = "allow-update-window-pin-state"
description = "允许前端更新窗口固定状态"

# 关键改动：commands 后面要接 .allow
commands.allow = [
    "update_window_pin_state"
]

[[permission]]
identifier = "allow-clipboard-operations"
description = "允许前端执行剪贴板操作"

# 关键改动：commands 后面要接 .allow
commands.allow = [
    "get_clipboard_history",
    "clear_history",
    "delete_clipboard_item",
    "toggle_favorite",
    "get_favorite_items",
    "paste_to_active_window",
    "html_to_text",
    "markdown_to_html_command",
    "copy_to_clipboard_no_history",
    "update_global_last_hash",
    "apply_no_activate_style",
    "get_mouse_position",
    "save_clipboard_history",
    "load_clipboard_history_command",
    "save_settings",
    "load_settings_command"
]

[[permission]]
identifier = "allow-register-global-shortcut"
description = "允许前端注册全局快捷键"

commands.allow = [
    "register_global_shortcut"
]

[[permission]]
identifier = "allow-unregister-global-shortcut"
description = "允许前端注销全局快捷键"

commands.allow = [
    "unregister_global_shortcut"
]

[[permission]]
identifier = "allow-text-expand-operations"
description = "允许前端管理文本扩展规则"

commands.allow = [
    "load_text_expand_rules",
    "save_text_expand_rules",
    "reload_text_expand_rules"
]
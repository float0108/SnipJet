<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnipJet - 文本扩展</title>
    <link rel="stylesheet" href="./common/style.css" />
    <link rel="stylesheet" href="./views/expander/expander.css" />
    <link rel="stylesheet" href="./common/icon.css" />
  </head>
  <body class="expander-body">
    <!-- 固定工具栏 -->
    <div class="toolbar" data-tauri-drag-region>
      <div class="toolbar-group toolbar-left">
        <button id="add-rule-btn" class="toolbar-btn" title="添加规则">
          <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
        <button id="save-rules-btn" class="toolbar-btn" title="保存规则">
          <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
        </button>
        <div class="toolbar-divider"></div>
        <div class="filter-group">
          <select id="group-filter" class="filter-select" title="按分组筛选">
            <option value="">全部分组</option>
          </select>
        </div>
      </div>
      <div class="toolbar-group toolbar-right">
        <span class="rule-count" id="rule-count">0 条规则</span>
        <div class="help-wrapper">
          <button id="help-btn" class="toolbar-btn" title="使用说明">
            <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
          </button>
          <div class="help-dropdown" id="help-dropdown">
            <div class="help-item"><strong>触发词</strong> - 输入关键词自动触发扩展</div>
            <div class="help-item"><strong>分组</strong> - 点击标签编辑，用于归类管理</div>
            <div class="help-item"><strong>保存</strong> - 修改后点击保存按钮生效</div>
          </div>
        </div>
        <button id="close-btn" class="toolbar-btn" title="关闭">
          <svg class="icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
    </div>

    <!-- 主内容区域 -->
    <div class="expander-content ghost-scrollbar">
      <div id="rules-list" class="rules-list">
        <!-- 规则列表将在这里动态生成 -->
      </div>
    </div>

    <script type="module" src="./views/expander/expander.js"></script>
  </body>
</html>

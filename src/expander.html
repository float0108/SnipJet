<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnipJet - 文本扩展</title>
    <link rel="stylesheet" href="./common/style.css" />
    <link rel="stylesheet" href="./views/expander/expander.css" />
    <link rel="stylesheet" href="./common/icon.css" />
    <script type="module" src="./views/expander/expander.js"></script>
  </head>
  <body class="expander-body">
    <div class="expander-container">
      <div class="header-top" data-tauri-drag-region>
        <h1 class="section-title">文本扩展规则</h1>
        <div class="header-actions">
          <button class="window-close-btn" id="close-button">
            <svg
              viewBox="0 0 24 24"
              width="14"
              height="14"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
      </div>

      <div class="expander-content">
        <div class="toolbar">
          <button id="add-rule-btn" class="action-btn primary">
            <span class="icon">+</span>
            添加规则
          </button>
          <button id="save-rules-btn" class="action-btn">
            <span class="icon">💾</span>
            保存规则
          </button>
        </div>

        <div id="rules-list" class="rules-list">
          <!-- 规则列表将在这里动态生成 -->
        </div>

        <div class="expander-help">
          <h3>使用说明</h3>
          <ul>
            <li>触发词：输入该关键词时会自动触发扩展</li>
            <li>扩展内容：触发后自动输入的文本</li>
            <li>分组：用于组织管理规则</li>
            <li>修改规则文件后需要重启软件生效</li>
          </ul>
        </div>
      </div>
    </div>
  </body>
</html>

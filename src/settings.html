<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width" />
    <title>SnipJet 设置</title>
    <link rel="stylesheet" href="./common/style.css" />
    <link rel="stylesheet" href="./views/settings/settings.css" />
    <link rel="stylesheet" href="./common/icon.css" />
  </head>
  <body>
    <div class="settings-container">
      <div class="sidebar">
        <div class="sidebar-item">软件设置</div>
        <div class="sidebar-item active">快捷键设置</div>
        <div class="sidebar-item">复制设置</div>
        <div class="sidebar-item">界面设置</div>
      </div>

      <div class="content">
        <div class="header-top" data-tauri-drag-region>
          <h1 class="section-title">快捷键设置</h1>
          <div class="header-actions" data-tauri-drag-region="false">
            <button class="window-close-btn" id="close-button">
              <svg
                viewBox="0 0 24 24"
                width="14"
                height="14"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
              </svg>
            </button>
          </div>
        </div>

        <div id="shortcuts-content">
          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">显示/隐藏界面</div>
            </div>
            <div class="setting-control">
              <input
                type="text"
                class="shortcut-input"
                id="toggle-interface-shortcut"
                placeholder="未设置"
                readonly
              />
              <button
                class="clear-btn"
                onclick="clearShortcut('toggle-interface-shortcut')"
              >
                清空
              </button>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">功能粘贴</div>
            </div>
            <div class="setting-control">
              <input
                type="text"
                class="shortcut-input"
                id="function-paste-shortcut"
                placeholder="未设置"
                readonly
              />
              <button
                class="clear-btn"
                onclick="clearShortcut('function-paste-shortcut')"
              >
                清空
              </button>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">快捷粘贴修饰键</div>
              <div class="setting-description">配合数字键 1~9 使用</div>
            </div>
            <div class="setting-control">
              <select class="select-input" id="quick-paste-shortcut">
                <option value="ctrl">Ctrl</option>
                <option value="num">NumPad</option>
              </select>
            </div>
          </div>
        </div>

        <div id="software-content" style="display: none">
          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">开机启动</div>
              <div class="setting-description">启动电脑时自动运行 SnipJet</div>
            </div>
            <div class="setting-control">
              <label class="toggle-switch">
                <input type="checkbox" id="startup-launch" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">自动检查更新</div>
            </div>
            <div class="setting-control">
              <label class="toggle-switch">
                <input type="checkbox" id="check-updates" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <div id="copy-content" style="display: none">
          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">去除格式</div>
              <div class="setting-description">粘贴时仅保留纯文本</div>
            </div>
            <div class="setting-control">
              <label class="toggle-switch">
                <input type="checkbox" id="strip-formatting" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">自动监听</div>
              <div class="setting-description">剪贴板变化时自动记录</div>
            </div>
            <div class="setting-control">
              <label class="toggle-switch">
                <input type="checkbox" id="auto-copy" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">划词复制</div>
              <div class="setting-description">选中文本后自动复制</div>
            </div>
            <div class="setting-control">
              <label class="toggle-switch">
                <input type="checkbox" id="copy-on-select" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>
        </div>

        <div id="interface-content" style="display: none">
          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">主题模式</div>
            </div>
            <div class="setting-control">
              <select class="select-input" id="theme">
                <option value="light">浅色</option>
                <option value="dark">深色</option>
                <option value="system">跟随系统</option>
              </select>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">界面语言</div>
            </div>
            <div class="setting-control">
              <select class="select-input" id="language">
                <option value="cn">简体中文</option>
                <option value="en">English</option>
              </select>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">失去焦点隐藏</div>
            </div>
            <div class="setting-control">
              <label class="toggle-switch">
                <input type="checkbox" id="auto-hide" />
                <span class="toggle-slider"></span>
              </label>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">预览大小</div>
            </div>
            <div class="setting-control">
              <select class="select-input" id="preview-size">
                <option value="small">小</option>
                <option value="medium">中</option>
                <option value="large">大</option>
              </select>
            </div>
          </div>

          <div class="setting-item">
            <div class="setting-info">
              <div class="setting-label">最大历史记录</div>
            </div>
            <div class="setting-control">
              <input
                type="number"
                class="number-input"
                id="max-history-items"
                min="10"
                max="1000"
                step="10"
              />
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="./views/settings/main.js"></script>
  </body>
</html>
